<template>
    <lightning-card title="Carousel Component">
        <div class="slds-m-around_medium">
            <lightning-carousel>
                <template for:each={carouselData} for:item="item">
                <lightning-carousel-image
                    key={item.headr}
                    src={item.src}
                    header={item.header}
                    description={item.description}
                    alternative-text={item.alternativeText}>
                </lightning-carousel-image>
                </template>
            </lightning-carousel>
        </div>
    </lightning-card>
</template>
