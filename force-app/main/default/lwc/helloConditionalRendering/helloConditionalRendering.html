<template>
    <lightning-card title="Conditional Rendering">
        <div class="slds-var-m-around_medium">
            <lightning-button
                variant="brand"
                label="Show Data"
                title="Show Data"
                onclick={handlerClick}
                class="slds-var-m-left_x-small">
            </lightning-button>
            <template if:true={isVisible}>
                <div>Welcome to Salesforce</div>
            </template>
            <template if:false={isVisible}>
                <div>Click the button to see the data</div>
            </template>
            <lightning-input type="text" 
            label="Type hello to view data"
            onclick={chageHandler}></lightning-input>
            <template if:true={helloMethod}>
                <div>Hurray!!! you have typed correctly</div>
            </template>            
        </div>
    </lightning-card>
</template>
